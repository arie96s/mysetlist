<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi WiFi Gratis - IndiHome</title>
    <style>
        /* Menggunakan font Sans-Serif modern */
        body {
            /* Warna latar belakang disesuaikan dengan tema IndiHome (Biru) */
            background: radial-gradient(circle, #2086c5 0%, #05599e 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff; /* Teks putih agar kontras dengan biru */
            transition: background-color 0.5s ease;
        }

        /* Mode Error - dipicu lewat JS */
        body.system-failure {
            background: #0a0a0a;
            color: #ff0000;
        }

        /* Scan Area */
        .wifi-label {
            text-align: center;
            z-index: 20;
            transition: opacity 0.5s;
            max-width: 90%;
        }

        /* Mengganti barcode lama dengan gambar yang diupload */
        .barcode-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 20px auto;
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
            display: none; 
        }

        .container {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .prank-img {
            position: absolute;
            max-width: 85%;
            max-height: 85%;
            border: 5px solid #333;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
            opacity: 0;
            transform: scale(0.2) rotate(-10deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show {
            opacity: 1;
            transform: scale(1.1) rotate(0deg);
        }

        .error-text {
            display: none;
            font-weight: 900;
            font-size: 1.8rem;
            text-align: center;
            padding: 0 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: blink 0.2s infinite;
        }

        .signature {
            position: fixed;
            bottom: 20px;
            opacity: 0.5;
            font-size: 0.8rem;
            color: inherit;
        }

        @keyframes blink {
            0% { opacity: 1; color: #ff0000; }
            50% { opacity: 0; color: #ffffff; }
            100% { opacity: 1; color: #ff0000; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    
    <div class="wifi-label" id="wifiLabel">
        <img src="1777232711548.webp" alt="Scan Barcode IndiHome" class="barcode-img">
        <p style="font-weight: 500; letter-spacing: 1px;">Mencari koneksi internet stabil...</p>
    </div>

    <div class="error-text" id="errorMsg">404:FAKIR WIFI DETECTED</div>

    <div class="container">
        <img id="img1" class="prank-img" src="1777228358999.webp" alt="Prank 1">
        <img id="img2" class="prank-img" src="1777228422026.webp" alt="Prank 2">
        <img id="img3" class="prank-img" src="1777228472727.webp" alt="Prank 3">
    </div>

    <div class="signature">@arie96s</div>

    <script>
        window.onload = function() {
            const wifiLabel = document.getElementById('wifiLabel');
            const errorMsg = document.getElementById('errorMsg');
            const overlay = document.getElementById('overlay');
            const images = [
                document.getElementById('img1'),
                document.getElementById('img2'),
                document.getElementById('img3')
            ];

            function startPrank() {
                // 1. Hilangkan label WiFi
                wifiLabel.style.display = 'none';
                
                // 2. Aktifkan mode visual "rusak"
                document.body.classList.add('system-failure');
                errorMsg.style.display = 'block';
                overlay.style.display = 'block';

                // 3. Jalankan sequence gambar
                let currentIndex = 0;
                function showNextImage() {
                    if (currentIndex < images.length) {
                        if (currentIndex > 0) images[currentIndex - 1].style.opacity = "0";
                        images[currentIndex].classList.add('show');
                        currentIndex++;
                        setTimeout(showNextImage, 2500);
                    } else {
                        // Loop kembali ke awal setelah semua gambar muncul
                        setTimeout(() => {
                            images.forEach(img => img.classList.remove('show'));
                            currentIndex = 0;
                            showNextImage();
                        }, 3000);
                    }
                }
                showNextImage();
            }

            // Prank dimulai otomatis setelah 3 detik
            setTimeout(startPrank, 3000);
        };
    </script>
</body>
</html>
