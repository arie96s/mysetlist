<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi WiFi Gratis</title>
    <style>
        /* Menggunakan font Sans-Serif modern */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #000;
            transition: background-color 0.5s ease;
        }

        /* Mode Error - dipicu lewat JS */
        body.system-failure {
            background-color: #0a0a0a;
            color: #ff0000;
        }

        /* Scan Area - Tampilan awal yang menipu */
        .wifi-label {
            text-align: center;
            z-index: 20;
            transition: opacity 0.5s;
        }

        .barcode {
            width: 200px;
            height: 100px;
            background: linear-gradient(90deg, 
                #000 5%, transparent 5%, 
                transparent 10%, #000 10%, 
                #000 12%, transparent 12%,
                #000 15%, #000 20%,
                transparent 20%, transparent 22%,
                #000 22%, #000 25%,
                transparent 25%, transparent 30%,
                #000 30%, #000 32%
            );
            background-size: 30px 100%;
            margin: 20px auto;
            border: 2px solid #000;
            padding: 5px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05),
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
            display: none; /* Muncul saat error */
        }

        .container {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .prank-img {
            position: absolute;
            max-width: 85%;
            max-height: 85%;
            border: 5px solid #333;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
            opacity: 0;
            transform: scale(0.2) rotate(-10deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show {
            opacity: 1;
            transform: scale(1.1) rotate(0deg);
        }

        .error-text {
            display: none;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: blink 0.2s infinite;
        }

        .signature {
            position: fixed;
            bottom: 20px;
            opacity: 0.3;
            font-size: 0.8rem;
            color: inherit;
        }

        @keyframes blink {
            0% { opacity: 1; color: #ff0000; }
            50% { opacity: 0; color: #ffffff; }
            100% { opacity: 1; color: #ff0000; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    
    <div class="wifi-label" id="wifiLabel">
        <h1 style="margin-bottom: 0;">FREE HIGH-SPEED WIFI</h1>
        <div class="barcode"></div>
        <p>Scanning for nearby networks...</p>
    </div>

    <div class="error-text" id="errorMsg">CRITICAL SYSTEM FAILURE: FAKIR WIFI DETECTED</div>

    <div class="container">
        <img id="img1" class="prank-img" src="1777228358999.webp" alt="Prank 1">
        <img id="img2" class="prank-img" src="1777228422026.webp" alt="Prank 2">
        <img id="img3" class="prank-img" src="1777228472727.webp" alt="Prank 3">
    </div>

    <div class="signature">@arie96s</div>

    <script>
        window.onload = function() {
            const wifiLabel = document.getElementById('wifiLabel');
            const errorMsg = document.getElementById('errorMsg');
            const overlay = document.getElementById('overlay');
            const images = [
                document.getElementById('img1'),
                document.getElementById('img2'),
                document.getElementById('img3')
            ];

            function startPrank() {
                // 1. Hilangkan label WiFi
                wifiLabel.style.display = 'none';
                
                // 2. Aktifkan mode visual "rusak"
                document.body.classList.add('system-failure');
                errorMsg.style.display = 'block';
                overlay.style.display = 'block';

                // 3. Jalankan sequence gambar
                let currentIndex = 0;
                function showNextImage() {
                    if (currentIndex < images.length) {
                        if (currentIndex > 0) images[currentIndex - 1].style.opacity = "0";
                        images[currentIndex].classList.add('show');
                        currentIndex++;
                        setTimeout(showNextImage, 2500);
                    } else {
                        setTimeout(() => {
                            images.forEach(img => img.classList.remove('show'));
                            currentIndex = 0;
                            showNextImage();
                        }, 3000);
                    }
                }
                showNextImage();
            }

            // Prank dimulai otomatis setelah 3 detik "loading" palsu
            setTimeout(startPrank, 3000);
        };
    </script>
</body>
</html>
