<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Error - 404 Broken</title>
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ff0000;
        }

        /* Efek latar belakang berkedip/glitch */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .prank-img {
            position: absolute;
            max-width: 80%;
            max-height: 80%;
            border: 5px solid #333;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            opacity: 0;
            transform: scale(0.5); /* Mulai dari jauh */
            transition: all 2.5s ease-out; /* Pergerakan lembut */
        }

        /* Kelas untuk memicu animasi */
        .show {
            opacity: 1;
            transform: scale(1.1); /* Mendekat melampaui ukuran normal */
        }

        .signature {
            position: fixed;
            bottom: 20px;
            opacity: 0.5;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #ffffff;
            z-index: 5;
        }

        .error-text {
            position: absolute;
            top: 10%;
            font-weight: bold;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <div class="error-text">CRITICAL SYSTEM FAILURE: FAKIR WIFI DETECTED</div>

    <div class="container">
        <img id="img1" class="prank-img" src="mysetlist/1777228358999.webp" alt="Prank 1">
        <img id="img2" class="prank-img" src="mysetlist/1777228422026.webp" alt="Prank 2">
        <img id="img3" class="prank-img" src="mysetlist/1777228472727.webp" alt="Prank 3">
    </div>

    <div class="signature">Prank by @arie96s</div>

    <script>
        window.onload = function() {
            const images = [
                document.getElementById('img1'),
                document.getElementById('img2'),
                document.getElementById('img3')
            ];

            let currentIndex = 0;

            function showNextImage() {
                if (currentIndex < images.length) {
                    // Sembunyikan gambar sebelumnya jika ada
                    if (currentIndex > 0) {
                        images[currentIndex - 1].style.opacity = "0";
                    }
                    
                    // Tampilkan gambar saat ini dengan animasi mendekat
                    images[currentIndex].classList.add('show');
                    
                    currentIndex++;
                    
                    // Atur jeda waktu antar gambar (3 detik)
                    setTimeout(showNextImage, 3000);
                } else {
                    // Opsional: Loop kembali ke awal
                    setTimeout(() => {
                        images.forEach(img => img.classList.remove('show'));
                        currentIndex = 0;
                        showNextImage();
                    }, 4000);
                }
            }

            // Memulai sequence setelah 1 detik
            setTimeout(showNextImage, 1000);
        };
    </script>
</body>
</html>
